  desc: Accessors and topological traversal functions.
  contents:
  - dagri_node
  - dagri_edge
  - dagri_gate
  - dagri_nodes
  - dagri_edges
  - dagri_gates
  - dagri_upstream
  - dagri_downstream
  - dagri_ancestors
  - dagri_descendants
